<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .sw { display:flex; flex-direction:column; gap:6px; flex:1 1 0; min-width:0 }
  .chip { aspect-ratio: 1.4 / 1; border-radius: 10px; border: 1px solid rgba(20,17,13,.06) }
  .name { font: var(--u-body-s); font-weight:600; color: var(--u-ink); margin-top:4px }
  .hex  { font: var(--u-mono); font-size:11px; color: var(--u-ink-3) }
</style></head>
<body><div class="card">
  <div class="eyebrow">Accent — one bold note, used rarely</div>
  <div style="display:flex; gap:14px; margin-top:14px; align-items:flex-start">
    <div class="sw" style="flex:1.4">
      <div class="chip" style="background:var(--u-ember); aspect-ratio: 2/1; display:flex; align-items:flex-end; padding:14px; color:var(--u-ember-ink); font: var(--u-display-s); letter-spacing:-.015em">Ember</div>
      <div class="name">Ember — primary CTA, brand mark</div>
      <div class="hex">#E84A1F</div>
    </div>
    <div class="sw"><div class="chip" style="background:var(--u-ember-soft)"></div><div class="name">Ember soft</div><div class="hex">#FBE2D5</div></div>
    <div class="sw" style="flex:1.4">
      <div class="chip" style="background:var(--u-indigo); aspect-ratio: 2/1; display:flex; align-items:flex-end; padding:14px; color:var(--u-indigo-ink); font: var(--u-display-s); letter-spacing:-.015em">Indigo</div>
      <div class="name">Indigo — admin, deep contrast</div>
      <div class="hex">#1F2B4C</div>
    </div>
    <div class="sw"><div class="chip" style="background:var(--u-indigo-soft)"></div><div class="name">Indigo soft</div><div class="hex">#DCE0EA</div></div>
  </div>
</div></body></html>
