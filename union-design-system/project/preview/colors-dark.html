<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card" style="background:var(--u-dark); color:var(--u-dark-ink); min-height:100vh">
  <div class="eyebrow" style="color:var(--u-dark-ink-2)">Dark inverse — hero footers, admin chrome</div>
  <div style="margin-top:12px; display:grid; grid-template-columns: 1fr 1fr; gap:20px">
    <div>
      <div style="font: var(--u-display-m); letter-spacing:-0.02em; color:var(--u-dark-ink)">Dark on cream is the rule, not<br>the exception.</div>
      <div style="font: var(--u-body); color: var(--u-dark-ink-2); margin-top:10px; max-width:380px">
        Inverse panels appear at section breaks, footers, and admin chrome — never on subscriber-content surfaces.
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px">
      <div style="display:flex; gap:10px; align-items:center"><span style="width:22px;height:22px;border-radius:6px;background:var(--u-dark)"></span><span style="font:var(--u-body-s)">Dark · #262220</span></div>
      <div style="display:flex; gap:10px; align-items:center"><span style="width:22px;height:22px;border-radius:6px;background:var(--u-dark-2)"></span><span style="font:var(--u-body-s)">Dark-2 · #312C26</span></div>
      <div style="display:flex; gap:10px; align-items:center"><span style="width:22px;height:22px;border-radius:6px;background:var(--u-dark-ink)"></span><span style="font:var(--u-body-s)">Ink · #F2EEE3</span></div>
      <div style="display:flex; gap:10px; align-items:center"><span style="width:22px;height:22px;border-radius:6px;background:var(--u-dark-ink-2)"></span><span style="font:var(--u-body-s)">Ink-2 · #A89F8E</span></div>
      <div style="display:flex; gap:10px; align-items:center"><span style="width:22px;height:22px;border-radius:6px;background:var(--u-dark-rule)"></span><span style="font:var(--u-body-s)">Rule · #3A352E</span></div>
    </div>
  </div>
</div></body></html>
