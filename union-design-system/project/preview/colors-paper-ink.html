<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .sw { display:flex; flex-direction:column; gap:6px; flex:1 1 0; min-width:0 }
  .chip { aspect-ratio: 1.4 / 1; border-radius: 10px; border: 1px solid rgba(20,17,13,.06) }
  .name { font: var(--u-body-s); font-weight:600; color: var(--u-ink); margin-top:4px }
  .hex  { font: var(--u-mono); font-size:11px; color: var(--u-ink-3) }
</style></head>
<body><div class="card">
  <div class="eyebrow">Paper &amp; ink — the whole system rests here</div>
  <div style="display:flex; gap:14px; margin-top:14px">
    <div class="sw"><div class="chip" style="background:var(--u-bg)"></div><div class="name">Bg · cream</div><div class="hex">#F2EEE3</div></div>
    <div class="sw"><div class="chip" style="background:var(--u-surface)"></div><div class="name">Surface</div><div class="hex">#FBF9F3</div></div>
    <div class="sw"><div class="chip" style="background:var(--u-surface-2)"></div><div class="name">Elevated</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--u-ink)"></div><div class="name" style="color:var(--u-ink)">Ink</div><div class="hex">#2A2520</div></div>
    <div class="sw"><div class="chip" style="background:var(--u-ink-2)"></div><div class="name">Ink-2</div><div class="hex">#5C564D</div></div>
    <div class="sw"><div class="chip" style="background:var(--u-ink-3)"></div><div class="name">Ink-3</div><div class="hex">#8E887E</div></div>
    <div class="sw"><div class="chip" style="background:var(--u-rule)"></div><div class="name">Rule</div><div class="hex">#E0D9C8</div></div>
  </div>
</div></body></html>
