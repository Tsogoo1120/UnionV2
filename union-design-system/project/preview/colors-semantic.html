<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .sw { display:flex; flex-direction:column; gap:6px; flex:1 1 0; min-width:0 }
  .chip { aspect-ratio: 1.6 / 1; border-radius: 10px; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between; border: 1px solid rgba(20,17,13,.04); }
  .name { font: var(--u-body-s); font-weight:600; color: var(--u-ink); margin-top:4px }
  .hex  { font: var(--u-mono); font-size:11px; color: var(--u-ink-3) }
  .lbl  { font: var(--u-label); letter-spacing:.14em; text-transform:uppercase }
</style></head>
<body><div class="card">
  <div class="eyebrow">Semantic — status, never decoration</div>
  <div style="display:flex; gap:14px; margin-top:14px">
    <div class="sw">
      <div class="chip" style="background:var(--u-success-soft); color:var(--u-success)">
        <div class="lbl">Approved</div>
        <div style="font-weight:600">Subscription active</div>
      </div>
      <div class="name">Success</div><div class="hex">#2B6B3D · #DCE8DD</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--u-warn-soft); color:#7A4F00">
        <div class="lbl">Pending</div>
        <div style="font-weight:600">Awaiting review</div>
      </div>
      <div class="name">Warn</div><div class="hex">#B97A12 · #F3E4C0</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--u-danger-soft); color:var(--u-danger)">
        <div class="lbl">Denied</div>
        <div style="font-weight:600">Resubmit required</div>
      </div>
      <div class="name">Danger</div><div class="hex">#B8341A · #F1D8D2</div>
    </div>
  </div>
</div></body></html>
