<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .chip { display:inline-flex; align-items:center; gap:6px; height:26px; padding:0 12px; border-radius:999px; font: var(--u-body-s); font-weight:500; border:1px solid transparent }
  .dot { width:6px; height:6px; border-radius:999px; background: currentColor }
</style></head>
<body><div class="card">
  <div class="eyebrow">Badges / status pills</div>
  <div style="display:flex; gap:10px; margin-top:14px; flex-wrap:wrap">
    <span class="chip" style="background:var(--u-success-soft); color:var(--u-success)"><span class="dot"></span>Active · 28 days left</span>
    <span class="chip" style="background:var(--u-warn-soft); color:#7A4F00"><span class="dot"></span>Pending review</span>
    <span class="chip" style="background:var(--u-danger-soft); color:var(--u-danger)"><span class="dot"></span>Denied</span>
    <span class="chip" style="background:var(--u-rule); color:var(--u-ink-2)">Expired</span>
    <span class="chip" style="background:var(--u-ember-soft); color:var(--u-ember)">New</span>
    <span class="chip" style="background:var(--u-indigo-soft); color:var(--u-indigo)">Admin</span>
  </div>
  <div style="display:flex; gap:10px; margin-top:14px; flex-wrap:wrap">
    <span class="chip" style="border-color:var(--u-rule-2); color:var(--u-ink-2)">Videos</span>
    <span class="chip" style="border-color:var(--u-rule-2); color:var(--u-ink-2)">Articles</span>
    <span class="chip" style="background:var(--u-ink); color:var(--u-bg)">Community · 12</span>
    <span class="chip" style="border-color:var(--u-rule-2); color:var(--u-ink-2)">Tests</span>
  </div>
</div></body></html>
