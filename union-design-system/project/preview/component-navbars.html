<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="eyebrow">Top nav — marketing &amp; dashboard</div>
  <div style="margin-top:14px; display:flex; flex-direction:column; gap:14px">
    <!-- Marketing nav -->
    <div style="border:1px solid var(--u-rule); background:var(--u-surface); border-radius:var(--u-r-3); padding:14px 18px; display:flex; align-items:center; justify-content:space-between">
      <div style="display:flex; align-items:center; gap:28px">
        <div style="font:var(--u-display); font-weight:700; font-size:22px; letter-spacing:-.04em">Union<span style="color:var(--u-ember)">.</span></div>
        <div style="display:flex; gap:20px; font:var(--u-body-s); color:var(--u-ink-2); font-weight:500">
          <span>Үйлчилгээ</span><span>Хичээл</span><span>Нийтлэл</span><span>1:1 коучинг</span>
        </div>
      </div>
      <div style="display:flex; gap:10px; align-items:center">
        <span style="font:var(--u-body-s); color:var(--u-ink-2); font-weight:500">Нэвтрэх</span>
        <span style="background:var(--u-ink); color:var(--u-bg); font:var(--u-body-s); font-weight:500; padding:8px 14px; border-radius:var(--u-r-2)">Гишүүн болох</span>
      </div>
    </div>
    <!-- Dashboard nav (dense) -->
    <div style="border:1px solid var(--u-rule); background:var(--u-surface-2); border-radius:var(--u-r-3); padding:10px 14px; display:flex; align-items:center; justify-content:space-between">
      <div style="display:flex; align-items:center; gap:18px">
        <div style="font:var(--u-display); font-weight:700; font-size:18px; letter-spacing:-.04em">Union<span style="color:var(--u-ember)">.</span></div>
        <span style="font:var(--u-mono); font-size:11px; color:var(--u-ink-3); border-left:1px solid var(--u-rule); padding-left:14px">Хяналтын самбар</span>
      </div>
      <div style="display:flex; gap:10px; align-items:center">
        <span style="font:var(--u-body-s); padding:6px 10px; border-radius: var(--u-r-pill); background:var(--u-success-soft); color:var(--u-success); font-weight:500">● Active · 24 days</span>
        <div style="width:28px; height:28px; border-radius:999px; background:#D4B98C; display:flex; align-items:center; justify-content:center; font:var(--u-body-s); font-weight:600; color:var(--u-ink)">A</div>
      </div>
    </div>
  </div>
</div></body></html>
