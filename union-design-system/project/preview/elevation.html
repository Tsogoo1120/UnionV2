<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="eyebrow">Elevation — borders first, shadows second</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:18px; margin-top:18px">
    <div>
      <div style="height:90px; background:var(--u-surface); box-shadow: var(--u-shadow-0); border-radius:12px"></div>
      <div class="code" style="margin-top:8px">shadow-0 · hairline</div>
    </div>
    <div>
      <div style="height:90px; background:var(--u-surface); box-shadow: var(--u-shadow-1); border-radius:12px"></div>
      <div class="code" style="margin-top:8px">shadow-1 · resting card</div>
    </div>
    <div>
      <div style="height:90px; background:var(--u-surface-2); box-shadow: var(--u-shadow-2); border-radius:12px"></div>
      <div class="code" style="margin-top:8px">shadow-2 · raised</div>
    </div>
    <div>
      <div style="height:90px; background:var(--u-surface-2); box-shadow: var(--u-shadow-3); border-radius:12px"></div>
      <div class="code" style="margin-top:8px">shadow-3 · overlay/modal</div>
    </div>
  </div>
  <div style="font:var(--u-body-s); color:var(--u-ink-3); margin-top:14px; max-width:560px">
    Edges carry the structure. Shadows are reserved for true elevation — modals, dropdowns, raised feature cards.
  </div>
</div></body></html>
