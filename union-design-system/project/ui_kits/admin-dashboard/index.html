<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<title>Union — Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="../../assets/union-monogram.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>body { margin: 0; }</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="AdminNav.jsx"></script>
  <script type="text/babel" src="AdminTopbar.jsx"></script>
  <script type="text/babel" src="KPIStrip.jsx"></script>
  <script type="text/babel" src="PaymentsQueue.jsx"></script>
  <script type="text/babel" src="SlotsView.jsx"></script>
  <script type="text/babel" src="ContentList.jsx"></script>

  <script type="text/babel">
    function App() {
      const [tab, setTab] = React.useState("overview");
      const meta = {
        overview: { title: "Тойм",          sub: "Сүүлийн 24 цаг",   action: null },
        payments: { title: "Төлбөр",        sub: "Гишүүнчлэлийн төлбөр", action: null },
        slots:    { title: "Цаг хуваарь",   sub: "1:1 коучинг",      action: null },
        bookings: { title: "Захиалга",      sub: "1:1 коучинг",      action: null },
        lessons:  { title: "Видео хичээл",  sub: "Контент · 01",     action: null },
        readings: { title: "Хамтын уншилт", sub: "Контент · 02",     action: null },
        articles: { title: "Нийтлэл",       sub: "Контент · 05",     action: null },
        tests:    { title: "Тест",          sub: "Контент · 04",     action: null },
        community:{ title: "Нийгэмлэг",     sub: "Модерац",          action: null },
        users:    { title: "Хэрэглэгчид",   sub: "Систем",           action: null },
      };
      const m = meta[tab] || meta.overview;
      const SCREEN_LABELS = { overview: "01 Overview", payments: "02 Payments", slots: "03 Slots", bookings: "04 Bookings", lessons: "05 Lessons" };
      return (
        <div style={{ display: "flex", minHeight: "100vh" }} data-screen-label={SCREEN_LABELS[tab] || "Admin"}>
          <AdminNav tab={tab} setTab={setTab} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
            <AdminTopbar title={m.title} subtitle={m.sub} action={m.action}/>
            <main style={{ padding: "32px 36px 80px", flex: 1 }}>
              {tab === "overview" && <KPIStrip/>}
              {tab === "payments" && <PaymentsQueue/>}
              {tab === "slots"    && <SlotsView/>}
              {(tab === "lessons" || tab === "readings" || tab === "articles" || tab === "tests") && <ContentList/>}
              {(tab === "bookings" || tab === "community" || tab === "users") && (
                <div style={{ background: "var(--u-surface-2)", border: "1px dashed var(--u-rule-2)", borderRadius: "var(--u-r-3)", padding: 48, textAlign: "center", color: "var(--u-ink-3)" }}>
                  <div className="u-eyebrow">Coming up next</div>
                  <div style={{ font: "var(--u-display)", fontWeight: 700, fontSize: 36, letterSpacing: "-0.015em", color: "var(--u-ink)", marginTop: 8 }}>{m.title}</div>
                  <div style={{ marginTop: 8 }}>Same chrome, same table pattern. Wire to backend.</div>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
