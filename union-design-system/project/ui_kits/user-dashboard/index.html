<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<title>Union — Хяналтын самбар</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="../../assets/union-monogram.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>body { margin: 0; }</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="DashNav.jsx"></script>
  <script type="text/babel" src="StatusCard.jsx"></script>
  <script type="text/babel" src="ServiceHub.jsx"></script>
  <script type="text/babel" src="ContinueRow.jsx"></script>
  <script type="text/babel" src="LessonGrid.jsx"></script>
  <script type="text/babel" src="CoachingList.jsx"></script>
  <script type="text/babel" src="ProfileScreen.jsx"></script>

  <script type="text/babel">
    function App() {
      const [tab, setTab] = React.useState("hub");
      const SCREEN_LABELS = { hub: "01 Hub", lessons: "02 Lessons", coaching: "03 Coaching", profile: "04 Profile" };
      return (
        <div data-screen-label={SCREEN_LABELS[tab]}>
          <DashNav tab={tab} setTab={setTab} days={24} />
          <main style={{ maxWidth: 1240, margin: "0 auto", padding: "40px 32px 120px", display: "flex", flexDirection: "column", gap: 40 }}>
            {tab === "hub" && (<>
              <StatusCard days={24} />
              <ServiceHub setTab={setTab} />
              <ContinueRow />
            </>)}
            {tab === "lessons"  && <LessonGrid />}
            {tab === "coaching" && <CoachingList />}
            {tab === "profile"  && <ProfileScreen />}
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
